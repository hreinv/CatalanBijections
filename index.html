<!DOCTYPE html>
<!-- Serve via: python3 -m http.server 8080 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalan Number Bijection Explorer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Catalan Bijection Explorer</h1>
    </header>
    <main>
      <div id="canvas-container">
        <canvas id="main-canvas"></canvas>
      </div>
      <div id="controls">
        <div class="control-group">
          <label for="source-select">Source:</label>
          <select id="source-select"></select>
          <label for="target-select">Target:</label>
          <select id="target-select"></select>
        </div>
        <div class="control-group">
          <label for="n-select">n:</label>
          <select id="n-select">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3" selected>3</option>
            <option value="4">4</option>
          </select>
        </div>
        <div class="control-group">
          <button id="btn-prev" title="Previous instance">&#x25C0;</button>
          <span id="instance-indicator">1 of 5</span>
          <button id="btn-next" title="Next instance">&#x25B6;</button>
        </div>
        <div class="control-group disabled">
          <button id="btn-start" title="Jump to start">&#x23EE;</button>
          <button id="btn-step-back" title="Step back">&#x23EA;</button>
          <button id="btn-play-pause" title="Play/Pause">Play</button>
          <button id="btn-step-fwd" title="Step forward">&#x23E9;</button>
          <button id="btn-end" title="Jump to end">&#x23ED;</button>
        </div>
        <div class="control-group disabled">
          <label for="speed-slider">Speed:</label>
          <input type="range" id="speed-slider" min="0.5" max="3" step="0.1" value="1">
          <span id="speed-display">1.0x</span>
        </div>
      </div>
    </main>
  </div>
  <noscript>This app requires JavaScript and must be served over HTTP (not file://).</noscript>
  <script type="module" src="js/main.js"></script>
</body>
</html>
