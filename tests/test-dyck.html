<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dyck Word Tests</title>
  <style>
    body { font-family: monospace; margin: 2rem; background: #fafafa; }
    .pass { color: green; }
    .fail { color: red; font-weight: bold; }
    #results { white-space: pre-wrap; line-height: 1.6; }
    h1 { font-size: 1.4rem; }
    .summary { margin-top: 1rem; padding: 0.5rem; border: 2px solid; }
    .summary.all-pass { border-color: green; color: green; }
    .summary.has-fail { border-color: red; color: red; }
  </style>
</head>
<body>
  <h1>Dyck Word Engine -- Test Suite</h1>
  <div id="results">Loading modules...</div>

  <script type="module">
    const results = document.getElementById('results');
    let passed = 0;
    let failed = 0;

    function log(msg, ok) {
      const span = document.createElement('span');
      span.className = ok ? 'pass' : 'fail';
      span.textContent = (ok ? 'PASS' : 'FAIL') + ': ' + msg + '\n';
      results.appendChild(span);
      if (ok) passed++; else failed++;
    }

    function assert(condition, msg) {
      log(msg, !!condition);
    }

    function assertThrows(fn, errorType, msg) {
      try {
        fn();
        log(msg + ' (no error thrown)', false);
      } catch (e) {
        log(msg, e instanceof errorType);
      }
    }

    function arraysEqual(a, b) {
      if (a.length !== b.length) return false;
      for (let i = 0; i < a.length; i++) {
        if (a[i] !== b[i]) return false;
      }
      return true;
    }

    try {
      results.textContent = '';

      const { enumerate, validate } = await import('/js/core/dyck.js');
      const { CORRESPONDENCE_COLORS, THEME_COLORS } = await import('/js/core/colors.js');

      // --- enumerate tests ---
      log('--- enumerate() ---', true);

      const w1 = enumerate(1);
      assert(w1.length === 1, 'enumerate(1) returns 1 word');
      assert(w1[0] && arraysEqual(w1[0], [1, -1]), 'enumerate(1) -> [[1, -1]]');

      const w2 = enumerate(2);
      assert(w2.length === 2, 'enumerate(2) returns 2 words');
      assert(w2.every(w => w.length === 4), 'enumerate(2) words have length 4');

      const w3 = enumerate(3);
      assert(w3.length === 5, 'enumerate(3) returns 5 words');
      assert(w3.every(w => w.length === 6), 'enumerate(3) words have length 6');

      const w4 = enumerate(4);
      assert(w4.length === 14, 'enumerate(4) returns 14 words');
      assert(w4.every(w => w.length === 8), 'enumerate(4) words have length 8');

      // Every enumerated word must pass validate
      log('--- enumerate -> validate cross-check ---', true);
      for (let n = 1; n <= 4; n++) {
        const words = enumerate(n);
        const allValid = words.every(w => validate(w));
        assert(allValid, `All enumerate(${n}) words pass validate()`);
      }

      // RangeError for out-of-bounds
      assertThrows(() => enumerate(0), RangeError, 'enumerate(0) throws RangeError');
      assertThrows(() => enumerate(5), RangeError, 'enumerate(5) throws RangeError');

      // --- validate tests ---
      log('--- validate() ---', true);

      assert(validate([1, -1]) === true, 'validate([1,-1]) -> true');
      assert(validate([1, 1, -1, -1]) === true, 'validate([1,1,-1,-1]) -> true');
      assert(validate([-1, 1]) === false, 'validate([-1,1]) -> false (negative prefix)');
      assert(validate([1, 1, -1]) === false, 'validate([1,1,-1]) -> false (non-zero sum)');
      assert(validate([]) === true, 'validate([]) -> true (empty word)');

      // --- colors tests ---
      log('--- CORRESPONDENCE_COLORS ---', true);

      assert(Array.isArray(CORRESPONDENCE_COLORS), 'CORRESPONDENCE_COLORS is an array');
      assert(CORRESPONDENCE_COLORS.length === 8, 'CORRESPONDENCE_COLORS has 8 entries');
      const uniqueColors = new Set(CORRESPONDENCE_COLORS);
      assert(uniqueColors.size === 8, 'All 8 colors are distinct');
      assert(CORRESPONDENCE_COLORS.every(c => /^#[0-9A-Fa-f]{6}$/.test(c)),
        'All colors are valid 6-digit hex strings');

      log('--- THEME_COLORS ---', true);

      assert(typeof THEME_COLORS === 'object' && THEME_COLORS !== null, 'THEME_COLORS is an object');
      const requiredKeys = ['background', 'stroke', 'gridLine', 'highlight', 'text'];
      assert(requiredKeys.every(k => k in THEME_COLORS), 'THEME_COLORS has all required keys');
      assert(requiredKeys.every(k => /^#[0-9A-Fa-f]{6}$/.test(THEME_COLORS[k])),
        'All theme colors are valid hex strings');

      // --- Summary ---
      const summary = document.createElement('div');
      summary.className = 'summary ' + (failed === 0 ? 'all-pass' : 'has-fail');
      summary.textContent = `\nDone: ${passed} passed, ${failed} failed out of ${passed + failed} total`;
      results.appendChild(summary);

    } catch (e) {
      results.textContent = 'FAIL: Module import error -- ' + e.message;
    }
  </script>
</body>
</html>
